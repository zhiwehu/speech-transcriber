# Speech Transcriber Configuration
# 敏感信息（API Key 等）请放在 .env 文件中

# 运行模式：online 或 local
# 可被环境变量 MODE 覆盖
mode: online

# 在线模式配置
online:
  # API Key 从环境变量 DASHSCOPE_API_KEY 读取
  
  # API 接入点
  endpoint: "https://dashscope.aliyuncs.com/api/v1/services/audio/asr/transcription"
  
  # 模型选择
  asr_model: "fun-asr"
  
  # OSS 配置（敏感信息从环境变量读取）
  storage:
    type: "oss"
    # oss_bucket 从环境变量 OSS_BUCKET 读取
    # oss_access_key 从环境变量 OSS_ACCESS_KEY 读取
    # oss_access_secret 从环境变量 OSS_ACCESS_SECRET 读取
    oss_endpoint: "oss-cn-beijing.aliyuncs.com"  # 根据你的 Bucket 地域修改

# 本地模式配置
local:
  # 设备选择：cpu, cuda, npu
  device: cpu
  
  # 模型路径（modelscope 模型名）
  models:
    vad: "damo/speech_fsmn_vad_zh-cn-16k-common-pytorch"
    asr: "damo/speech_paraformer-large-vad-punc-zh-cn-16k-common-zh-cn"
    speaker: "damo/speech_campplus_sv_zh-cn_16k-common"
    diarization: "pyannote/speaker-diarization-3.1"
  
  # 推理参数
  inference:
    batch_size: 1
    num_workers: 2
    use_openvino: false  # Intel OpenVINO 加速

# 通用设置
common:
  sample_rate: 16000
  vad_threshold: 0.5
  diarization_threshold: 0.3
  output_format: "txt"  # txt, json, srt, markdown
